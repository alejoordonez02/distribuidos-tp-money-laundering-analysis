services:
  rabbitmq:
    build:
      context: ./src/rabbitmq
      dockerfile: Dockerfile
    container_name: rabbitmq
    environment:
      - RABBITMQ_LOG_LEVELS=error
    healthcheck:
      interval: 5s
      retries: 10
      start_period: 50s
      test: rabbitmq-diagnostics check_port_connectivity
      timeout: 3s
    ports:
      - 5672:5672
      - 15672:15672
  gateway:
    build:
      context: ./src/
      dockerfile: gateway/Dockerfile
    container_name: gateway
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - GATEWAY_HOST=gateway
      - GATEWAY_PORT=12345
      - MOM_HOST=rabbitmq
      - MOM_PORT=5672
      - SERVER_QUEUE_RX=server_responses
      - TRANSACTIONS_TX=transactions
      - ACCOUNTS_TX=accounts_tx
  filter:
    build:
      context: ./src/
      dockerfile: filter/Dockerfile
    container_name: filter
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - MOM_HOST=rabbitmq
      - MOM_PORT=5672
      - TRANSACTIONS_RX=transactions
      - FILTERED_TX=filtered_transactions
  join:
    build:
      context: ./src/
      dockerfile: join/Dockerfile
    container_name: join
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - MOM_HOST=rabbitmq
      - MOM_PORT=5672
      - CLIENT_RESPONSES_RX=filtered_transactions
      - CLIENT_RESPONSES_TX=server_responses
  client_0:
    build:
      context: ./src/
      dockerfile: client/Dockerfile
    container_name: client_0
    depends_on:
      - gateway
    environment:
      - TRANSACTIONS_PATH=/datasets/transactions_0.csv
      - ACCOUNTS_PATH=/datasets/LI-Small_accounts.csv
      - RESPONSES_PATH=/responses/responses_0.csv
      - GATEWAY_HOST=gateway
      - GATEWAY_PORT=12345
    volumes:
      - ./datasets:/datasets
      - ./responses:/responses
  client_1:
    build:
      context: ./src/
      dockerfile: client/Dockerfile
    container_name: client_1
    depends_on:
      - gateway
    environment:
      - TRANSACTIONS_PATH=/datasets/transactions_1.csv
      - ACCOUNTS_PATH=/datasets/LI-Small_accounts.csv
      - RESPONSES_PATH=/responses/responses_1.csv
      - GATEWAY_HOST=gateway
      - GATEWAY_PORT=12345
    volumes:
      - ./datasets:/datasets
      - ./responses:/responses
