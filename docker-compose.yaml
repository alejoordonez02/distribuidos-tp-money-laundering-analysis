      - UC3_PERIOD_A_TRANSACTIONS_TX=uc3_transactons_period_A
      - UC3_PERIOD_B_TRANSACTIONS_TX=uc3_transactons_period_B
      - UC4_TRANSACTIONS_TX=uc4_filtered_transactions
      - UC5_TRANSACTIONS_TX=uc5_filtered_transactions
