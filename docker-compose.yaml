services:
  rabbitmq:
    build:
      context: ./src/rabbitmq
      dockerfile: Dockerfile
    container_name: rabbitmq
    environment:
      - RABBITMQ_LOG_LEVELS=error
    healthcheck:
      interval: 5s
      retries: 10
      start_period: 50s
      test: rabbitmq-diagnostics check_port_connectivity
      timeout: 3s
    ports:
      - 5672:5672
      - 15672:15672
  gateway:
    build:
      context: ./src/
      dockerfile: gateway/Dockerfile
    container_name: gateway
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - GATEWAY_HOST=gateway
      - GATEWAY_PORT=12345
      - MOM_HOST=rabbitmq
      - MOM_PORT=5672
      - SERVER_QUEUE_RX=server_queue_rx
      - TRANSACTIONS_TX=transactions
      - ACCOUNTS_TX=accounts_tx
  filter:
    build:
      context: ./src/
      dockerfile: filter/Dockerfile
    container_name: filter
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - MOM_HOST=rabbitmq
      - MOM_PORT=5672
      - TRANSACTIONS_RX=transactions
      - FILTERED_TX=filtered
  client:
    build:
      context: ./src/
      dockerfile: client/Dockerfile
    container_name: client
    depends_on:
      - gateway
    environment:
      - TRANSACTIONS_PATH=/datasets/transactions100.csv
      - ACCOUNTS_PATH=/datasets/accounts42.csv
      - RESPONSES_PATH=/responses/responses.csv
      - GATEWAY_HOST=gateway
      - GATEWAY_PORT=12345
    volumes:
      - ./datasets:/datasets
      - ./output:/output
